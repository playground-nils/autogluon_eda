name: TestPypi Release
'on': workflow_dispatch
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@master
    - name: Set up Python
      uses: actions/setup-python@v1
      with:
        python-version: '3.7'
    - name: Install dependencies
      run: 'python -m pip install --upgrade pip

        pip install setuptools wheel twine pypandoc packaging

        '
    - name: Build and publish
      env:
        TWINE_USERNAME: ${{ secrets.PYPI_TEST_USERNAME }}
        TWINE_PASSWORD: ${{ secrets.PYPI_TEST_PASSWORD }}
        RELEASE: 1
      run: "for v in common core features tabular multimodal text vision timeseries\
        \ autogluon\ndo\n  cd \"$v\"/\n  python setup.py sdist bdist_wheel\n  twine\
        \ upload --repository testpypi dist/* --verbose\n  cd ..\ndone\n"
